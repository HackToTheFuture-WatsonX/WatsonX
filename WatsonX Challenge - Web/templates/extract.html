{% extends "base.html" %}
{% set active = "extract" %}
{% block title %}Extract Files{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Extract Files</h1>
  <button class="btn btn-green" id="extractBtn" onclick="startExtract()">▶&nbsp; Start Extraction</button>
</div>

<div class="progress-bar-wrap" id="progressWrap" style="display:none">
  <div class="progress-bar-inner" id="progressBar"></div>
</div>
<div class="status-bar" id="statusBar">Ready.</div>

<h2 class="section-label">Results</h2>
<div id="resultsArea"></div>

<script>
let pollTimer = null;

async function startExtract() {
  const btn = document.getElementById('extractBtn');
  const bar = document.getElementById('statusBar');
  const prog = document.getElementById('progressWrap');

  btn.disabled    = true;
  btn.textContent = '⏳ Running…';
  bar.textContent = 'Starting extraction pipeline…';
  bar.className   = 'status-bar status-info';
  prog.style.display = '';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('resultsArea').innerHTML = '';

  try {
    const r = await fetch('/api/extract', { method: 'POST' });
    if (r.status === 409) {
      bar.textContent = '⚠ Extraction already running.';
      bar.className   = 'status-bar status-error';
      resetBtn();
      return;
    }
    bar.textContent = 'Pipeline running — polling for results…';
    startPoll();
  } catch(e) {
    bar.textContent = '⚠ Error: ' + e;
    bar.className   = 'status-bar status-error';
    resetBtn();
  }
}

function startPoll() {
  let progress = 5;
  const progBar = document.getElementById('progressBar');
  pollTimer = setInterval(async () => {
    try {
      const r    = await fetch('/api/extract/status');
      const data = await r.json();

      // Animate progress bar while running
      if (data.running) {
        progress = Math.min(progress + 8, 90);
        progBar.style.width = progress + '%';
        return;
      }

      // Done
      clearInterval(pollTimer);
      progBar.style.width = '100%';
      document.getElementById('statusBar').textContent = 'Extraction complete.';
      document.getElementById('statusBar').className   = 'status-bar status-ok';

      if (data.result) {
        renderResults(data.result);
      }
      resetBtn();
    } catch(e) {
      clearInterval(pollTimer);
      document.getElementById('statusBar').textContent = '⚠ Poll error: ' + e;
      resetBtn();
    }
  }, 2000);
}

function renderResults(text) {
  const area = document.getElementById('resultsArea');
  const lines = text.split('\n');
  let html = '';
  let inCard = false;

  for (const line of lines) {
    if (line.startsWith('✅') || line.startsWith('❌')) {
      if (inCard) html += '</div>';
      const ok    = line.startsWith('✅');
      const cls   = ok ? 'result-card card-ok' : 'result-card card-err';
      const badge = ok
        ? '<span class="badge badge-ok">✅ Completed</span>'
        : '<span class="badge badge-err">❌ Failed</span>';
      html  += `<div class="${cls}"><div class="card-top"><span class="card-fname">${escHtml(line)}</span>${badge}</div>`;
      inCard = true;
    } else if (line.trim().startsWith('Reference') || line.trim().startsWith('Word') ||
               line.trim().startsWith('Excel') || line.trim().startsWith('JSON') ||
               line.trim().startsWith('Log') || line.trim().startsWith('Error')) {
      html += `<div class="card-line">${escHtml(line.trim())}</div>`;
    }
  }
  if (inCard) html += '</div>';
  area.innerHTML = html || '<p class="muted">No result details yet.</p>';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function resetBtn() {
  const btn = document.getElementById('extractBtn');
  btn.disabled    = false;
  btn.textContent = '▶ Start Extraction';
  document.getElementById('progressWrap').style.display = 'none';
}
</script>
{% endblock %}
