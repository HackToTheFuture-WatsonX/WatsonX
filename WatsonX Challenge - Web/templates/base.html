<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Background Check Automation{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="sidebar-title">BG Check<br>Automation</div>
        </div>
      </div>
      <div class="sidebar-subtitle">Report Processing Suite</div>
    </div>

    <hr class="sidebar-divider" />
    <div class="nav-section-label">Navigation</div>

    <a href="/"        class="nav-item {% if active=='home'     %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </span>
      Home
    </a>
    <a href="/check"   class="nav-item {% if active=='check'    %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
        </svg>
      </span>
      Check Box
    </a>
    <a href="/extract" class="nav-item {% if active=='extract'  %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/>
        </svg>
      </span>
      Extract Files
    </a>
    <a href="/insights" class="nav-item {% if active=='insights' %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </span>
      Insights
    </a>

    <hr class="sidebar-divider" style="margin-top:8px" />
    <div class="nav-section-label">Assistant</div>

    <a href="/chat"    class="nav-item {% if active=='chat'     %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
      </span>
      AI Assistant
    </a>

    <div class="sidebar-version">v2.0.0 &nbsp;·&nbsp; IBM WatsonX</div>
  </nav>

  <!-- ── Main content ─────────────────────────────────────────────────────── -->
  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Chat FAB ─────────────────────────────────────────────────────────── -->
  {% if active != 'chat' %}
  <a href="/chat" class="wxo-fab" title="Chat with AI Assistant">
    <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 6a2 2 0 0 1 2-2h20a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H10l-6 4V6z" fill="#fff"/>
      <circle cx="11" cy="13" r="1.8" fill="rgba(108,99,255,0.7)"/>
      <circle cx="16" cy="13" r="1.8" fill="rgba(108,99,255,0.7)"/>
      <circle cx="21" cy="13" r="1.8" fill="rgba(108,99,255,0.7)"/>
    </svg>
  </a>
  {% endif %}

</body>
</html>
