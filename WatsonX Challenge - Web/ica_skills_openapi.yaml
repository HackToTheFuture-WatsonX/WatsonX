openapi: 3.0.3
info:
  title: Background Check Report Automation — ICA Skills
  description: >
    OpenAPI skill definitions for IBM Consulting Advantage (ICA) 1.0.
    Register these endpoints inside your ICA tenant so the AI assistant
    can call them as tools during a conversation.

    Base URL: http://<your-server-host>:5000
  version: "1.0.0"

servers:
  - url: http://localhost:5000
    description: Local development server

paths:
  /api/scan:
    post:
      operationId: scanBoxFolder
      summary: Scan Box folder for new PDF reports
      description: >
        Scans the configured IBM Box source folder for new PDF background check
        reports and registers them as Pending in the tracking database.
        Returns a summary of how many files were found.
      responses:
        "200":
          description: Scan result summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:   { type: string }
                  total:     { type: integer }
                  completed: { type: integer }
                  pending:   { type: integer }

  /api/extract:
    post:
      operationId: runExtraction
      summary: Run the PDF extraction pipeline
      description: >
        Starts the full background check PDF extraction pipeline in a background
        thread. Decrypts, parses, exports Word/Excel/JSON, and uploads to Box.
        Poll /api/extract/status to check progress.
      responses:
        "200":
          description: Extraction started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }

  /api/extract/status:
    get:
      operationId: getExtractionStatus
      summary: Poll extraction pipeline running state
      description: Returns whether extraction is currently running and the last result summary.
      responses:
        "200":
          description: Extraction status
          content:
            application/json:
              schema:
                type: object
                properties:
                  running: { type: boolean }
                  result:  { type: string, nullable: true }

  /api/status:
    get:
      operationId: getFileStatus
      summary: Get Pending / Completed file counts
      description: Returns total, completed, and pending PDF file counts from the tracking database.
      responses:
        "200":
          description: File counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:     { type: integer }
                  completed: { type: integer }
                  pending:   { type: integer }

  /api/logs:
    get:
      operationId: getLogHistory
      summary: Get extraction log history
      description: Returns a plain-text summary of extraction logs for the given time period.
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [day, week, month, year]
            default: day
          description: Time period to retrieve logs for.
      responses:
        "200":
          description: Log history summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary: { type: string }

  /api/chat:
    post:
      operationId: lookupReport
      summary: Look up an extracted background check report
      description: >
        Searches extracted JSON reports by subject name or case reference number.
        Returns structured report data including employment checks, reference
        checks, and database check results. Use this when the user asks about
        a specific person or reference number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: >
                    The lookup query — use format "look up <name or reference>".
                    Example: "look up Manalo" or "look up RN-123456"
                history:
                  type: array
                  items:
                    type: object
                    properties:
                      role:    { type: string, enum: [user, assistant] }
                      content: { type: string }
                  default: []
      responses:
        "200":
          description: Report data or not-found message
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply: { type: string }
